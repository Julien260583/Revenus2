<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTH - Revenus</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #14171f;
      --surface2: #1c2030;
      --border: rgba(255,255,255,0.07);
      --accent: #e8c27a;
      --accent2: #7ab8e8;
      --accent3: #7ae8b8;
      --text: #f0ede8;
      --muted: #7a7f8e;
      --danger: #e87a7a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
      pointer-events: none;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -100px; left: -100px; animation-delay: -7s; }

    @keyframes drift {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Layout */
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 48px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }
    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .logo-mark {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      font-weight: 500;
    }
    .demo-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,194,122,0.1);
      border: 1px solid rgba(232,194,122,0.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 12px;
      border-radius: 100px;
    }
    .demo-badge span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: block; animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Period picker (compact) ──────────────────────────────────────── */
    .picker-wrap {
      margin-bottom: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }
    .picker-range-label {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      color: var(--accent);
      letter-spacing: -0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .picker-sep {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .picker-divider {
      width: 1px; height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }
    .shortcuts { display: flex; gap: 6px; flex-wrap: wrap; }
    .shortcut-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .shortcut-btn:hover, .shortcut-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,194,122,0.07);
    }
    .picker-selects { display: flex; align-items: center; gap: 6px; }
    .picker-selects select, .picker-filters select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .picker-selects select:focus, .picker-filters select:focus { border-color: var(--accent); }
    .picker-arrow { color: var(--muted); font-size: 13px; }
    .picker-filters { display: flex; gap: 6px; align-items: center; margin-left: auto; }
    .btn-analyse {
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-analyse:hover { background: #f0d28a; }
    .btn-analyse:disabled { opacity: 0.5; cursor: not-allowed; }

        /* KPI Grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.1s; }
    .kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .kpi-card:nth-child(4) { animation-delay: 0.2s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .kpi-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 16px 16px 0 0;
    }
    .kpi-card.gold::after { background: var(--accent); }
    .kpi-card.blue::after { background: var(--accent2); }
    .kpi-card.green::after { background: var(--accent3); }
    .kpi-card.red::after { background: var(--danger); }

    .kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .kpi-value {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .kpi-value.gold { color: var(--accent); }
    .kpi-value.blue { color: var(--accent2); }
    .kpi-value.green { color: var(--accent3); }
    .kpi-trend {
      font-size: 12px;
      color: var(--muted);
    }
    .kpi-trend.up { color: var(--accent3); }
    .kpi-trend.down { color: var(--danger); }

    /* Charts row */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.3s;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    canvas { max-width: 100%; }

    /* Bookings table */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.4s;
      margin-top: 16px;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
      padding: 0 12px 12px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td {
      padding: 14px 12px;
      color: var(--text);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-confirmed { background: rgba(122,232,184,0.12); color: var(--accent3); }
    .status-pending   { background: rgba(232,194,122,0.12); color: var(--accent); }
    .status-cancelled { background: rgba(232,122,122,0.12); color: var(--danger); }

    /* Error / empty state */
    #error-banner {
      display: none;
      align-items: center;
      gap: 12px;
      background: rgba(232,122,122,0.1);
      border: 1px solid rgba(232,122,122,0.25);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--danger);
      font-size: 14px;
      margin-bottom: 24px;
    }
    #error-banner.visible { display: flex; }

    .loading-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Config panel */
    .config-tip {
      display: flex;
      gap: 16px;
      background: rgba(122,184,232,0.06);
      border: 1px solid rgba(122,184,232,0.2);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .config-tip-icon { font-size: 20px; flex-shrink: 0; }
    .config-tip code {
      background: rgba(255,255,255,0.07);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--accent2);
    }


    /* ── Tabs ──────────────────────────────────────────────────────────── */
    .tabs-wrap { margin-top: 0; }
    .tabs-nav {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 10px 18px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-badge {
      background: rgba(232,194,122,0.15);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
    }

    /* ── Accordion logement ─────────────────────────────────────────────── */
    .accordion-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .accordion-header:hover { background: rgba(255,255,255,0.02); }
    .accordion-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .accordion-prop {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .accordion-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .accordion-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .accordion-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--accent);
    }
    .accordion-chevron {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.2s;
    }
    .accordion-item.open .accordion-chevron { transform: rotate(180deg); }
    .accordion-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .accordion-item.open .accordion-body { display: block; }
    .accordion-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .accordion-body thead th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
    }
    .accordion-body tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .accordion-body tbody tr:last-child { border-bottom: none; }
    .accordion-body tbody tr:hover { background: rgba(255,255,255,0.02); }
    .accordion-body tbody td { padding: 11px 16px; color: var(--text); }

    /* Charts row (inside tab) */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    @media (max-width: 1024px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="shell">
    <header>
      <div class="logo">
        <img src="/logo.png" alt="My Toul'House" style="height:44px; width:auto; object-fit:contain;"/>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="syncData()" id="sync-btn" style="
          background:transparent;border:1px solid var(--border);border-radius:8px;
          padding:8px 16px;color:var(--muted);font-family:'DM Sans',sans-serif;
          font-size:12px;font-weight:600;cursor:pointer;letter-spacing:1px;
          text-transform:uppercase;transition:all 0.2s;
        " onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
           onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
          ↻ Synchroniser
        </button>
        <div id="demo-badge" class="demo-badge" style="display:none">
          <span></span> Mode Démo
        </div>
      </div>
    </header>

    <!-- Period Picker (compact) -->
    <div class="picker-wrap">
      <div class="picker-selects">
        <select id="sel-start-month"></select>
        <select id="sel-start-year"></select>
      </div>
      <div class="picker-arrow">→</div>
      <div class="picker-selects">
        <select id="sel-end-month"></select>
        <select id="sel-end-year"></select>
      </div>
      <div class="picker-range-label" id="range-label"></div>
      <div class="picker-divider"></div>
      <div class="shortcuts">
        <button class="shortcut-btn" onclick="applyShortcut('thismonth',this)">Ce mois</button>
        <button class="shortcut-btn" onclick="applyShortcut('last3',this)">3 mois</button>
        <button class="shortcut-btn" onclick="applyShortcut('last6',this)">6 mois</button>
        <button class="shortcut-btn active" onclick="applyShortcut('ytd',this)">Jan → auj.</button>
        <button class="shortcut-btn" onclick="applyShortcut('lastyear',this)">Année −1</button>
        <button class="shortcut-btn" onclick="applyShortcut('next3',this)">+3 mois</button>
      </div>
      <div class="picker-divider"></div>
      <div class="picker-filters">
        <select id="source-filter" onchange="loadData()">
          <option value="all">Toutes les sources</option>
          <option value="AirbnbIntegration">Airbnb</option>
          <option value="BookingCom">Booking.com</option>
          <option value="Direct">Direct</option>
        </select>
        <select id="property-filter" onchange="loadData()">
          <option value="all">Tous les hébergements</option>
          <option value="550912">Morhange</option>
          <option value="550913">Scandinave</option>
          <option value="550914">Naturel</option>
          <option value="550915">Spa</option>
        </select>
        <button class="btn-analyse" id="analyse-btn" onclick="loadData()">Analyser</button>
      </div>
    </div>
    <input type="hidden" id="start-date"/>
    <input type="hidden" id="end-date"/>

    <div id="error-banner">
      ⚠️ <span id="error-msg"></span>
    </div>

    <div id="error-banner">
      ⚠️ <span id="error-msg"></span>
    </div>

    <!-- KPIs row 1 : 4 métriques -->
    <div class="kpi-grid" id="kpi-grid" style="display:none">
      <div class="kpi-card gold">
        <div class="kpi-label">Revenu Total</div>
        <div class="kpi-value gold" id="kpi-revenue">—</div>
        <div class="kpi-trend" id="kpi-revenue-trend"></div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Réservations</div>
        <div class="kpi-value blue" id="kpi-bookings">—</div>
        <div class="kpi-trend" id="kpi-bookings-trend"></div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Nuits vendues</div>
        <div class="kpi-value" id="kpi-nights">—</div>
        <div class="kpi-trend" id="kpi-nights-trend"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Revenu Moyen / Nuit</div>
        <div class="kpi-value gold" id="kpi-avg">—</div>
        <div class="kpi-trend" id="kpi-avg-trend"></div>
      </div>

      <!-- Row 2 : nets + hors commission côte à côte -->
      <div class="kpi-card green" style="grid-column: span 2">
        <div class="kpi-label">Revenus Nets <span style="font-size:10px;font-weight:400;color:var(--muted)">− 40€ prestation − 23% commission</span></div>
        <div class="kpi-value" style="color:var(--accent3)" id="kpi-net">—</div>
        <div class="kpi-trend" id="kpi-net-trend"></div>
      </div>
      <div class="kpi-card blue" style="grid-column: span 2">
        <div class="kpi-label">Hors commission <span style="font-size:10px;font-weight:400;color:var(--muted)">− 23% Airbnb &amp; Booking</span></div>
        <div class="kpi-value" style="color:var(--accent2)" id="kpi-hc">—</div>
        <div class="kpi-trend" id="kpi-hc-trend"></div>
      </div>

      <!-- Row 3 : occupation -->
      <div class="kpi-card" style="grid-column: 1 / -1">
        <div class="kpi-label">Taux d'occupation par logement</div>
        <div id="kpi-occupancy" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:8px"></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-wrap" id="tabs-wrap" style="display:none">
      <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('overview',this)">Vue d'ensemble</button>
        <button class="tab-btn" onclick="switchTab('bookings',this)">
          Réservations <span class="tab-badge" id="tab-bookings-count"></span>
        </button>
      </div>

      <!-- Tab: Vue d'ensemble -->
      <div class="tab-panel" id="tab-overview">
        <div class="charts-row">
          <div class="chart-card">
            <div class="chart-title">Revenus mensuels</div>
            <canvas id="revenueChart" height="120"></canvas>
          </div>
          <div class="chart-card">
            <div class="chart-title">Répartition par source</div>
            <canvas id="sourceChart" height="240"></canvas>
          </div>
        </div>
      </div>

      <!-- Tab: Réservations -->
      <div class="tab-panel" id="tab-bookings" style="display:none">
        <!-- Accordion par logement -->
        <div id="bookings-accordion"></div>
      </div>
    </div>


  <script>
    // ── Property map ─────────────────────────────────────────────────────
    const PROPERTIES = {
      550912: 'Morhange',
      550913: 'Scandinave',
      550914: 'Naturel',
      550915: 'Spa',
    };
    // ── Charts ────────────────────────────────────────────────────────────
    let revenueChart, sourceChart;

    const chartDefaults = {
      color: 'rgba(240,237,232,0.7)',
      plugins: { legend: { labels: { color: '#7a7f8e', font: { family: 'DM Sans', size: 12 } } } }
    };

    // ── Calcul prorata : nuits et revenus dans une période donnée ────────
    function prorataBooking(b, periodStart, periodEnd) {
      const arrDate  = new Date(b.arrival);
      const depDate  = new Date(b.departure);
      const ps = new Date(periodStart);
      const pe = new Date(periodEnd);

      // Intersection entre la réservation et la période
      const overlapStart = arrDate < ps ? ps : arrDate;
      const overlapEnd   = depDate > pe ? pe : depDate;

      if (overlapStart >= overlapEnd) return { nights: 0, amount: 0 };

      const nightsInPeriod = Math.round((overlapEnd - overlapStart) / 86400000);
      const pricePerNight  = b.nights > 0 ? b.totalAmount / b.nights : 0;
      return {
        nights: nightsInPeriod,
        amount: pricePerNight * nightsInPeriod,
      };
    }

    function buildMonthlyData(bookings, start, end) {
      const months = {};
      const s = new Date(start), e = new Date(end);
      let cur = new Date(s.getFullYear(), s.getMonth(), 1);
      while (cur <= e) {
        months[cur.toISOString().slice(0,7)] = { revenue: 0, net: 0 };
        cur.setMonth(cur.getMonth() + 1);
      }
      Object.keys(months).forEach(key => {
        const [y, m] = key.split('-').map(Number);
        const mStart = new Date(y, m - 1, 1);
        const mEnd   = new Date(y, m, 0);
        bookings.forEach(b => {
          const { amount, nights } = prorataBooking(b, mStart, new Date(mEnd.getTime() + 86400000));
          const ratio = b.nights > 0 ? nights / b.nights : 1;
          months[key].revenue += amount;
          months[key].net     += netRevenue(b) * ratio;
        });
      });
      return months;
    }

    function renderCharts(bookings, start, end) {
      const monthly       = buildMonthlyData(bookings, start, end);
      const labels        = Object.keys(monthly).map(k => {
        const [y, m] = k.split('-');
        return new Date(y, m-1).toLocaleDateString('fr-FR', { month: 'short', year:'2-digit' });
      });
      const revenueValues = Object.values(monthly).map(v => Math.round(v.revenue));
      const netValues     = Object.values(monthly).map(v => Math.round(v.net));
      // Différence = commissions + frais (zone grisée entre revenue et net)
      const deductValues  = revenueValues.map((r, i) => Math.round(r - netValues[i]));

      // Revenue stacked bar chart
      if (revenueChart) revenueChart.destroy();
      revenueChart = new Chart(document.getElementById('revenueChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Revenus nets',
              data: netValues,
              backgroundColor: 'rgba(122,232,184,0.5)',
              borderColor: 'rgba(122,232,184,0.9)',
              borderWidth: 1.5,
              borderRadius: 0,
              stack: 'rev',
            },
            {
              label: 'Commissions & frais',
              data: deductValues,
              backgroundColor: 'rgba(232,194,122,0.25)',
              borderColor: 'rgba(232,194,122,0.6)',
              borderWidth: 1.5,
              borderRadius: 4,
              stack: 'rev',
            }
          ]
        },
        options: {
          ...chartDefaults,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: { color: '#7a7f8e', font: { family:'DM Sans', size:11 }, boxWidth: 12, padding: 16 }
            },
            tooltip: {
              callbacks: {
                footer: (items) => {
                  const total = items.reduce((a, i) => a + i.raw, 0);
                  return `Total brut : ${total.toLocaleString('fr-FR')} €`;
                }
              }
            }
          },
          scales: {
            x: { stacked: true, ticks: { color: '#7a7f8e', font: { family:'DM Sans', size:11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
            y: { stacked: true, ticks: { color: '#7a7f8e', font: { family:'DM Sans', size:11 }, callback: v => v.toLocaleString('fr-FR') + ' €' }, grid: { color: 'rgba(255,255,255,0.04)' } }
          }
        }
      });

      // Source donut
      const sourceLabels = { AirbnbIntegration: 'Airbnb', BookingCom: 'Booking.com', Direct: 'Direct' };
      const sourceTotals = {};
      bookings.forEach(b => { sourceTotals[b.source] = (sourceTotals[b.source]||0) + (b.totalAmount||0); });
      if (sourceChart) sourceChart.destroy();
      sourceChart = new Chart(document.getElementById('sourceChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(sourceTotals).map(s => sourceLabels[s] || s),
          datasets: [{
            data: Object.values(sourceTotals),
            backgroundColor: ['rgba(232,194,122,0.7)', 'rgba(122,184,232,0.7)', 'rgba(122,232,184,0.7)'],
            borderColor: '#0d0f14',
            borderWidth: 3,
            hoverOffset: 6,
          }]
        },
        options: {
          ...chartDefaults,
          cutout: '68%',
          plugins: {
            legend: { position: 'bottom', labels: { color: '#7a7f8e', font: { family:'DM Sans', size:12 }, padding: 16 } }
          }
        }
      });
    }

    // ── Calcul revenu net par réservation ────────────────────────────────
    const PLATFORM_SOURCES = ['AirbnbIntegration', 'BookingCom'];
    const SERVICE_FEE  = 40;    // € par réservation
    const COMMISSION   = 0.23;  // 23% sur les plateformes

    function netRevenue(booking) {
      const gross = booking.totalAmount || 0;
      const fee   = SERVICE_FEE;
      const comm  = PLATFORM_SOURCES.includes(booking.source) ? gross * COMMISSION : 0;
      return Math.max(0, gross - fee - comm);
    }

    function revenueHorsCommission(booking) {
      const gross = booking.totalAmount || 0;
      const comm  = PLATFORM_SOURCES.includes(booking.source) ? gross * COMMISSION : 0;
      return Math.max(0, gross - comm);
    }

    // ── Render UI ─────────────────────────────────────────────────────────
    function renderKPIs(bookings, start, end) {
      const periodEnd1 = new Date(new Date(end).getTime() + 86400000);
      let total = 0, nights = 0, net = 0;

      let hc = 0;
      bookings.forEach(b => {
        const p     = prorataBooking(b, start, periodEnd1);
        const ratio = b.nights > 0 ? p.nights / b.nights : 1;
        total  += p.amount;
        nights += p.nights;
        // Net prorata : on applique le ratio de nuits aux déductions fixes aussi
        const bookingNet = netRevenue(b);
        net += bookingNet * ratio;
        hc  += revenueHorsCommission(b) * ratio;
      });

      const avg = nights > 0 ? total / nights : 0;

      document.getElementById('kpi-revenue').textContent  = total.toLocaleString('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 });
      document.getElementById('kpi-bookings').textContent = bookings.length;
      document.getElementById('kpi-nights').textContent   = nights;
      document.getElementById('kpi-avg').textContent      = avg.toLocaleString('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 });
      document.getElementById('kpi-net').textContent      = net.toLocaleString('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 });
      document.getElementById('kpi-hc').textContent       = hc.toLocaleString('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 });

      document.getElementById('kpi-revenue-trend').textContent  = 'Revenus au prorata de la période';
      document.getElementById('kpi-bookings-trend').textContent = 'réservations confirmées';
      document.getElementById('kpi-nights-trend').textContent   = `moy. ${(nights/Math.max(1,bookings.length)).toFixed(1)} nuits/séjour`;
      document.getElementById('kpi-avg-trend').textContent      = 'par nuit dans la période';
      document.getElementById('kpi-net-trend').textContent      = `déductions : ${bookings.length} × 40€ prestation + 23% commission plateformes`;
      document.getElementById('kpi-hc-trend').textContent       = `${bookings.filter(b => ['AirbnbIntegration','BookingCom'].includes(b.source)).length} réservations plateforme × 23% commission déduite`;

      // Taux d'occupation par logement
      const periodDays = Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
      const propFilter = document.getElementById('property-filter').value;
      const propsToShow = propFilter !== 'all'
        ? { [propFilter]: PROPERTIES[propFilter] }
        : PROPERTIES;

      const nightsByProp = {};
      bookings.forEach(b => {
        const p = prorataBooking(b, start, periodEnd1);
        nightsByProp[b.property_id] = (nightsByProp[b.property_id] || 0) + p.nights;
      });

      const occDiv = document.getElementById('kpi-occupancy');
      occDiv.innerHTML = Object.entries(propsToShow).map(([id, name]) => {
        const nights = nightsByProp[id] || 0;
        const rate   = Math.min(100, Math.round((nights / periodDays) * 100));
        const color  = rate >= 70 ? 'var(--accent3)' : rate >= 40 ? 'var(--accent)' : 'var(--muted)';
        return `
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:6px">${name}</div>
            <div style="font-family:'DM Serif Display',serif;font-size:28px;color:${color};line-height:1">${rate}%</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">${nights} nuits / ${periodDays} jours</div>
            <div style="margin-top:8px;height:4px;background:var(--border);border-radius:4px;overflow:hidden">
              <div style="height:100%;width:${rate}%;background:${color};border-radius:4px;transition:width 0.5s ease"></div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Tab switching ─────────────────────────────────────────────────────
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-overview').style.display = tab === 'overview' ? 'block' : 'none';
      document.getElementById('tab-bookings').style.display = tab === 'bookings'  ? 'block' : 'none';
    }

    // ── Accordion render ───────────────────────────────────────────────────
    function renderBookingsAccordion(bookings) {
      const container = document.getElementById('bookings-accordion');
      container.innerHTML = '';

      const sourceLabel = s => {
        if (s === 'AirbnbIntegration') return 'Airbnb';
        if (s === 'BookingCom') return 'Booking.com';
        return s || 'Direct';
      };

      // Group by property
      const groups = {};
      bookings.forEach(b => {
        if (!groups[b.property]) groups[b.property] = [];
        groups[b.property].push(b);
      });

      // Sort properties by total desc
      const sorted = Object.entries(groups).sort((a,b) =>
        b[1].reduce((s,x) => s + x.prorataAmount, 0) - a[1].reduce((s,x) => s + x.prorataAmount, 0)
      );

      sorted.forEach(([propName, items], i) => {
        const propTotal  = items.reduce((s,b) => s + b.prorataAmount, 0);
        const propNights = items.reduce((s,b) => s + b.prorataMaxNights, 0);

        const div = document.createElement('div');
        div.className = 'accordion-item' + (i === 0 ? ' open' : '');
        div.innerHTML = \`
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <div class="accordion-header-left">
              <div class="accordion-prop">\${propName}</div>
              <div class="accordion-meta">\${items.length} séjour\${items.length>1?'s':''} · \${propNights} nuits</div>
            </div>
            <div class="accordion-right">
              <div class="accordion-amount">\${propTotal.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}</div>
              <div class="accordion-chevron">▼</div>
            </div>
          </div>
          <div class="accordion-body">
            <table>
              <thead>
                <tr>
                  <th>Voyageur</th>
                  <th>Arrivée</th>
                  <th>Départ</th>
                  <th>Nuits</th>
                  <th>Source</th>
                  <th style="text-align:right">Total brut</th>
                  <th style="text-align:right">Prorata</th>
                  <th style="text-align:right">Net</th>
                </tr>
              </thead>
              <tbody>
                \${items.map(b => {
                  const ratio    = b.nights > 0 ? b.prorataMaxNights / b.nights : 1;
                  const netP     = netRevenue(b) * ratio;
                  const partial  = b.prorataMaxNights !== b.nights;
                  return \`<tr>
                    <td>\${b.guest || '—'}</td>
                    <td>\${b.arrival}</td>
                    <td>\${b.departure}</td>
                    <td>\${b.prorataMaxNights}\${partial ? \` <span style="color:var(--muted);font-size:10px">/ \${b.nights}</span>\` : ''}</td>
                    <td style="color:var(--muted)">\${sourceLabel(b.source)}</td>
                    <td style="text-align:right;color:var(--muted)">\${b.totalAmount.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}</td>
                    <td style="text-align:right;color:var(--accent);font-family:'DM Serif Display',serif">\${b.prorataAmount.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}\${partial?'<span style="color:var(--muted);font-size:10px;display:block">prorata</span>':''}</td>
                    <td style="text-align:right;color:var(--accent3);font-family:'DM Serif Display',serif">\${netP.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}</td>
                  </tr>\`;
                }).join('')}
              </tbody>
            </table>
          </div>
        \`;
        container.appendChild(div);
      });

      // Badge count
      document.getElementById('tab-bookings-count').textContent = bookings.length;
    }

    function toggleAccordion(header) {
      header.closest('.accordion-item').classList.toggle('open');
    }


    // ── Sync Lodgify → MongoDB ────────────────────────────────────────────
    async function syncData() {
      const btn = document.getElementById('sync-btn');
      btn.textContent = '↻ Sync en cours…';
      btn.disabled = true;

      try {
        const res  = await fetch('/api/sync-manual', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          btn.textContent = `✓ ${data.upserted} màj`;
          setTimeout(() => { btn.textContent = '↻ Synchroniser'; btn.disabled = false; }, 3000);
          loadData();
        } else {
          btn.textContent = '✗ Erreur';
          btn.disabled = false;
          alert(data.message);
        }
      } catch (err) {
        btn.textContent = '✗ Erreur';
        btn.disabled = false;
      }
    }

    // ── Period Picker (compact) ─────────────────────────────────────────────
    const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const today = new Date();
    const THIS_YEAR  = today.getFullYear();
    const THIS_MONTH = today.getMonth();

    function populateSelects() {
      const months = ['sel-start-month','sel-end-month'];
      months.forEach(id => {
        const sel = document.getElementById(id);
        MONTHS_FR.forEach((m, i) => {
          const opt = document.createElement('option');
          opt.value = i;
          opt.textContent = m;
          sel.appendChild(opt);
        });
      });
      const years = ['sel-start-year','sel-end-year'];
      years.forEach(id => {
        const sel = document.getElementById(id);
        for (let y = THIS_YEAR - 3; y <= THIS_YEAR + 1; y++) {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          sel.appendChild(opt);
        }
      });
      // Listen for manual changes
      ['sel-start-month','sel-start-year','sel-end-month','sel-end-year'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
          syncFromSelects();
          loadData();
        });
      });
    }

    function setPickerRange(startYear, startMonth, endYear, endMonth) {
      document.getElementById('sel-start-month').value = startMonth;
      document.getElementById('sel-start-year').value  = startYear;
      document.getElementById('sel-end-month').value   = endMonth;
      document.getElementById('sel-end-year').value    = endYear;
      syncFromSelects();
    }

    function syncFromSelects() {
      const sm = parseInt(document.getElementById('sel-start-month').value);
      const sy = parseInt(document.getElementById('sel-start-year').value);
      const em = parseInt(document.getElementById('sel-end-month').value);
      const ey = parseInt(document.getElementById('sel-end-year').value);
      const startKey = `${sy}-${String(sm+1).padStart(2,'0')}`;
      const endKey   = `${ey}-${String(em+1).padStart(2,'0')}`;
      document.getElementById('start-date').value = startKey;
      document.getElementById('end-date').value   = endKey;
      // Update label
      const sLabel = `${MONTHS_FR[sm].slice(0,3)} ${sy}`;
      const eLabel = `${MONTHS_FR[em].slice(0,3)} ${ey}`;
      document.getElementById('range-label').textContent =
        (startKey === endKey) ? sLabel : `${sLabel} → ${eLabel}`;
    }

    function applyShortcut(key, btn) {
      document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const t = today;
      switch (key) {
        case 'thismonth':
          setPickerRange(THIS_YEAR, THIS_MONTH, THIS_YEAR, THIS_MONTH); break;
        case 'last3': {
          const s = new Date(t.getFullYear(), t.getMonth() - 2, 1);
          setPickerRange(s.getFullYear(), s.getMonth(), THIS_YEAR, THIS_MONTH); break;
        }
        case 'last6': {
          const s = new Date(t.getFullYear(), t.getMonth() - 5, 1);
          setPickerRange(s.getFullYear(), s.getMonth(), THIS_YEAR, THIS_MONTH); break;
        }
        case 'ytd':
          setPickerRange(THIS_YEAR, 0, THIS_YEAR, THIS_MONTH); break;
        case 'lastyear':
          setPickerRange(THIS_YEAR - 1, 0, THIS_YEAR - 1, 11); break;
        case 'next3': {
          const e = new Date(t.getFullYear(), t.getMonth() + 3, 1);
          setPickerRange(THIS_YEAR, THIS_MONTH, e.getFullYear(), e.getMonth()); break;
        }
      }
      loadData();
    }

    function initPicker() {
      populateSelects();
      // Default: YTD
      setPickerRange(THIS_YEAR, 0, THIS_YEAR, THIS_MONTH);
    }

        // ── Main load function ────────────────────────────────────────────────
    async function loadData() {
      const monthStart = document.getElementById('start-date').value;
      const monthEnd   = document.getElementById('end-date').value;
      const btn        = document.getElementById('analyse-btn');
      const errBanner  = document.getElementById('error-banner');

      if (!monthStart || !monthEnd) { showError('Veuillez sélectionner une période.'); return; }
      if (monthStart > monthEnd) { showError('Le mois de début doit être avant le mois de fin.'); return; }

      // Convertir YYYY-MM en premier/dernier jour du mois
      const start = `${monthStart}-01`;
      const [ey, em] = monthEnd.split('-').map(Number);
      const end = `${monthEnd}-${String(new Date(ey, em, 0).getDate()).padStart(2,'0')}`;

      btn.disabled = true; btn.textContent = 'Chargement…';
      errBanner.classList.remove('visible');

      let data;

      try {
        const res = await fetch(`/api/reservations?start=${start}&end=${end}`);
        const json = await res.json();
        if (!res.ok) {
          showError(json.message || `Erreur ${res.status}`);
          return;
        }
        data = json;
      } catch (err) {
        showError(`Impossible de contacter l'API : ${err.message}`);
        return;
      }

      // Masquer le badge démo
      document.getElementById('demo-badge').style.display = 'none';

      // Normalize Lodgify v2 fields
      let bookings = (data.items || []).map(b => {
        const nights = Math.round((new Date(b.departure) - new Date(b.arrival)) / 86400000);
        // Source label
        let source = b.source || 'Direct';
        // Status normalization
        const rawStatus = b.status || '';
        let status;
        if (['Booked', 'CheckedIn', 'CheckedOut', 'Agreed'].includes(rawStatus)) status = 'confirmed';
        else if (['Tentative', 'Enquiry'].includes(rawStatus)) status = 'pending';
        else status = 'cancelled'; // Declined, CancelledByGuest, etc.

        return {
          property_id: b.property_id,
          property:    PROPERTIES[b.property_id] || `Propriété #${b.property_id}`,
          arrival:     b.arrival,
          departure:   b.departure,
          nights,
          source,
          status,
          totalAmount: b.total_amount || 0,
          guest:       b.guest?.name || '—',
        };
      });

      // Garder uniquement les réservations confirmées
      bookings = bookings.filter(b => b.status === 'confirmed');

      // Property filter
      const propFilter = document.getElementById('property-filter').value;
      if (propFilter !== 'all') bookings = bookings.filter(b => String(b.property_id) === propFilter);

      // Source filter
      const srcFilter = document.getElementById('source-filter').value;
      if (srcFilter !== 'all') bookings = bookings.filter(b => b.source === srcFilter);

      // Garder uniquement les réservations ayant des nuits dans la période + calcul prorata
      const periodEnd1 = new Date(new Date(end).getTime() + 86400000);
      bookings = bookings
        .map(b => {
          const p = prorataBooking(b, start, periodEnd1);
          return { ...b, prorataAmount: p.amount, prorataMaxNights: p.nights };
        })
        .filter(b => b.prorataMaxNights > 0);

      // Show sections
      document.getElementById('kpi-grid').style.display    = 'grid';
      document.getElementById('tabs-wrap').style.display   = 'block';

      renderKPIs(bookings, start, end);
      renderCharts(bookings, start, end);
      renderBookingsAccordion(bookings);

      btn.disabled = false; btn.textContent = 'Analyser';
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-banner').classList.add('visible');
      document.getElementById('analyse-btn').disabled = false;
      document.getElementById('analyse-btn').textContent = 'Analyser';
    }

    // Auto-load on start
    window.addEventListener('DOMContentLoaded', () => {
      initPicker();
      loadData();
    });
  </script>
</body>
</html>
